<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#FFFFFF" rx="20"/>

  <!-- Left Price House - Red -->
  <rect x="80" y="220" width="120" height="140" rx="20" fill="url(#grad2)"/>
  <polygon points="80,220 140,140 200,220" fill="url(#grad2)"/>
  <circle cx="120" cy="200" r="12" fill="white"/>
  
  <!-- Dollar sign in left house -->
  <g transform="translate(140, 280)">
    <text x="0" y="0" font-size="64" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">$</text>
  </g>

  <!-- Right Price House - Green -->
  <rect x="312" y="220" width="120" height="140" rx="20" fill="url(#grad3)"/>
  <polygon points="312,220 372,140 432,220" fill="url(#grad3)"/>
  <circle cx="352" cy="200" r="12" fill="white"/>
  
  <!-- Dollar sign in right house -->
  <g transform="translate(372, 280)">
    <text x="0" y="0" font-size="64" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">$</text>
  </g>

  <!-- Center Magnifying Glass Circle -->
  <circle cx="256" cy="220" r="90" fill="url(#grad1)" stroke="white" stroke-width="8"/>
  
  <!-- Magnifying Glass Details -->
  <circle cx="256" cy="220" r="70" fill="none" stroke="white" stroke-width="6"/>
  
  <!-- Shopping Cart Icon inside magnifying glass -->
  <g transform="translate(256, 195)">
    <!-- Cart body -->
    <path d="M -15 5 L -12 -15 L 12 -15 L 15 5 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cart handle -->
    <path d="M -10 -15 Q 0 -25 10 -15" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Cart wheels -->
    <circle cx="-10" cy="12" r="3" fill="white"/>
    <circle cx="10" cy="12" r="3" fill="white"/>
    <!-- Bar chart inside -->
    <rect x="-2" y="-2" width="2" height="8" fill="white" opacity="0.7"/>
    <rect x="2" y="-5" width="2" height="11" fill="white" opacity="0.7"/>
  </g>

  <!-- Magnifying Glass Handle -->
  <line x1="320" y1="280" x2="380" y2="340" stroke="url(#grad1)" stroke-width="28" stroke-linecap="round"/>

  <!-- VS Badge at bottom -->
  <rect x="200" y="360" width="112" height="70" rx="12" fill="#F97316" stroke="white" stroke-width="4"/>
  <g transform="translate(256, 395)">
    <text x="0" y="0" font-size="48" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">VS</text>
  </g>

  <!-- Left Arrow -->
  <path d="M 60 220 L 30 220" stroke="#F59E0B" stroke-width="20" stroke-linecap="round"/>
  <path d="M 35 205 L 20 220 L 35 235" stroke="#F59E0B" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right Arrow -->
  <path d="M 452 220 L 482 220" stroke="#F59E0B" stroke-width="20" stroke-linecap="round"/>
  <path d="M 477 205 L 492 220 L 477 235" stroke="#F59E0B" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
